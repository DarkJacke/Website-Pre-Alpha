<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberVoid Hub Launcher</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#07090f; color:#e6edf3; font-family:Inter,system-ui,sans-serif; }
    .card { width:min(760px,90vw); background:#111723; border:1px solid #263247; border-radius:16px; padding:24px; }
    a { color:#37e8ff; }
    code { background:#0d1320; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>CyberVoid Hub</h1>
    <p>This launcher page helps with local testing.</p>
    <ul>
      <li><strong>Online mode (React app):</strong> <a href="http://localhost:3000">http://localhost:3000</a></li>
      <li><strong>Offline mode (no login):</strong> <a href="http://127.0.0.1:8787">http://127.0.0.1:8787</a></li>
    </ul>
    <p>Run offline mode with: <code>./scripts/run_offline_mode.sh</code></p>
  </main>
</body>
</html>
